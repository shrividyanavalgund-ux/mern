# SonarQube project config for the frontend (React SPA).
# host.url and the auth token are passed on the CLI by the Jenkins pipeline.
sonar.projectKey=frontend
sonar.projectName=frontend

# Analyze application source only.
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Keep deps, build output and tests out of the main analysis.
sonar.exclusions=node_modules/**,build/**,public/**,**/*.test.js,**/*.test.jsx

# Tests (CRA convention: *.test.js[x] under src).
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx

# If you add a coverage step (npm test -- --coverage), point Sonar at it:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
