server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Never cache the runtime config so a redeploy/env change is picked up immediately
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }

    # SPA fallback: let the React Router / client handle unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
