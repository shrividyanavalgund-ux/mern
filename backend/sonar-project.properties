# SonarQube project config for the backend (Express API).
# host.url and the auth token are passed on the CLI by the Jenkins pipeline.
sonar.projectKey=mern-backend
sonar.projectName=mern-backend

# Analyze application source only.
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Keep deps, coverage and tests out of the main analysis.
sonar.exclusions=node_modules/**,coverage/**,**/*.test.js,**/*.spec.js

# If you add a coverage step (npm test -- --coverage), point Sonar at it:
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
