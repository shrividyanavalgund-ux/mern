# Istio ingress Gateway (native API) — binds the shared istio-ingressgateway.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: mern-istio-gateway
  namespace: default
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "istio.hobbyez.com"
        - "api-istio.hobbyez.com"
