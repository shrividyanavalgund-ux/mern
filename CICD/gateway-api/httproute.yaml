# HTTPRoutes live in the app namespaces and attach to the Gateway above.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: frontend
spec:
  parentRefs:
    - name: mern-gateway
      namespace: default
  hostnames:
    - "gateway.hobbyez.com"
  rules:
    - backendRefs:
        - name: frontend
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: backend
spec:
  parentRefs:
    - name: mern-gateway
      namespace: default
  hostnames:
    - "api-gateway.hobbyez.com"
  rules:
    - backendRefs:
        - name: backend
          port: 3000
