# Envoy Gateway entry point (Gateway API). Routes from any namespace may attach.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: mern-gateway
  namespace: default
spec:
  gatewayClassName: eg
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
