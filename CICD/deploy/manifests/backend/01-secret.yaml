# App + Mongo credentials the backend needs (Mongo lives in the `database` ns;
# secrets don't cross namespaces, so the creds are repeated here).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: backend
type: Opaque
data:
  jwt-secret:    c3VwZXJfc2VjcmV0X2tleQ==   # super_secret_key
  mongo-user:    YWRtaW4=                    # admin
  mongo-password: cGFzc3dvcmQ=               # password
  mongo-auth-db: YWRtaW4=                    # admin
