# Mongo root credentials. The root user is created in the "admin" database,
# so mongo-auth-db must be "admin" (this is the backend's MONGO_AUTH_SOURCE).
apiVersion: v1
kind: Secret
metadata:
  name: mongo-secret
  namespace: database
type: Opaque
data:
  root-username: YWRtaW4=          # admin
  root-password: cGFzc3dvcmQ=      # password
  mongo-auth-db: YWRtaW4=          # admin
